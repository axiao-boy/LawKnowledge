# GitHub Actions 工作流的名称，显示在 Actions 面板中
name: Deploy to Cloudflare Pages

# 触发条件：当代码推送到指定分支时自动执行此工作流
on:
  push:                        # 触发事件：push（推送代码）
    branches:                  # 指定哪些分支会触发
      - main                   # 只有推送到 main 分支时才触发

# 定义工作流中的任务（jobs）
jobs:
  build:                       # 任务名称，这里叫 build
    runs-on: ubuntu-latest     # 指定运行环境：使用最新版 Ubuntu 虚拟机

    # 任务执行的步骤列表
    steps:
      # 步骤1：拉取代码仓库到虚拟机
      - name: Checkout repository         # 步骤名称（可选，但便于阅读）
        uses: actions/checkout@v5         # 使用官方的 checkout 动作（版本 v5）
        with:
          fetch-depth: 0                  # 拉取完整的 git 历史（而非仅最新一次提交）

      # 步骤2：安装 Node.js 环境
      - name: Setup Node.js               # 步骤名称
        uses: actions/setup-node@v6       # 使用官方的 setup-node 动作（版本 v6）
        with:
          node-version: 20                # 指定 Node.js 版本为 20
          cache: npm                      # 启用 npm 依赖缓存，加速后续构建

      # 步骤3：安装项目依赖
      - name: Install dependencies        # 步骤名称
        run: npm ci                       # 执行命令：npm ci（严格按 package-lock.json 安装，比 npm install 更稳定）

      # 步骤4：构建 VitePress 站点
      - name: Build VitePress site        # 步骤名称
        run: npm run docs:build           # 执行命令：运行 package.json 中定义的 docs:build 脚本

      # 步骤5：部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages  # 步骤名称
        uses: cloudflare/pages-action@v1  # 使用 Cloudflare 官方的 Pages 部署动作（版本 v1）
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}      # Cloudflare API Token，从 GitHub Secrets 中获取
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}    # Cloudflare 账户 ID，从 GitHub Secrets 中获取
          projectName: lawknowledge                          # Cloudflare Pages 项目名称
          directory: docs/.vitepress/dist                    # 构建产物的目录（VitePress 构建输出位置）
          branch: main                                       # 部署的分支名称
